<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta http-equiv="Content-Security-Policy"
    content="default-src * data: gap: https://ssl.gstatic.com; style-src * 'unsafe-inline'; script-src * 'unsafe-inline' 'unsafe-eval'">
  <link rel="icon" href="components/images/logo-svg.svg">
  <title>Personal Tracker</title>
  <link rel="stylesheet" href="components/css/bootstrap.min.css">
  <link rel="stylesheet" href="components/css/main.css">

</head>

<body>
  <!-- Top Nav -->
  <div class="container">
    <nav class="navbar navbar-dark bg-dark fixed-top z-top-nav" style="z-index: 1050;">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Personal Expense</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar"
          aria-controls="offcanvasDarkNavbar" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="offcanvas offcanvas-end text-bg-dark w-75" tabindex="-1" id="offcanvasDarkNavbar"
          aria-labelledby="offcanvasDarkNavbarLabel">
          <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">Menu</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
              aria-label="Close"></button>
          </div>
          <div class="offcanvas-body">
            <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
              <li class="nav-item">
                <a class="nav-link" href="index.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="transaction.html">Transactions</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="new.html">Add Expense</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="log.html">Activity Log</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="settings.html">Settings</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </nav>
  </div>

  <section class="container main-content-wrapper">
    <div class="card bg-light border-0 shadow-sm w-100 mb-2">
      <div class="card-body p-3">

        <div class="d-flex justify-content-between align-items-center mb-2">
          <h5 class="mb-0 fw-bold text-dark">Expense List</h5>
        </div>

        <!--Search & Filter-->
        <div class="mb-3">
          <div class="row">

            <div class="col-12 col-md-7 mb-2 mb-md-0">
              <div class="input-group border rounded">
                <input type="search" class="form-control border-0" placeholder="Search..." aria-label="Search">
                <button class="btn btn-outline-secondary px-4" type="button">Search</button>
              </div>
            </div>

            <div class="col-12 col-md-5">
              <div class="dropdown h-100">
                <button class="btn btn-outline-secondary dropdown-toggle w-100 h-100" type="button"
                  id="dropdownMenuButton" data-bs-toggle="dropdown" aria-expanded="false">
                  Filter Category
                </button>
                <div class="dropdown-menu bg-light w-100" aria-labelledby="dropdownMenuButton">
                  <a class="dropdown-item" href="#">All Expenses</a>
                  <a class="dropdown-item" href="#">Food</a>
                  <a class="dropdown-item" href="#">Transport</a>
                </div>
              </div>
            </div>

          </div>
        </div>

        <!--Trans Table-->
        <div class="table-responsive bg-light rounded border">
          <table class="table table-striped table-hover align-middle mb-0 w-100">

            <thead class="table-custom-header">
              <tr>
                <th scope="col" class="text-nowrap px-3 py-3 border-0">#ID</th>
                <th scope="col" class="text-nowrap border-0 py-3">Date</th>
                <th scope="col" class="text-nowrap border-0 py-3">Amount (RM)</th>
                <th scope="col" class="text-nowrap border-0 py-3">Category</th>
                <th scope="col" class="text-nowrap border-0 py-3">Description</th>
                <th scope="col" class="text-nowrap border-0 py-3">Date Created</th>
                <th scope="col" class="text-nowrap border-0 py-3">Date Updated</th>
                <th scope="col" class="text-nowrap border-0 py-3 text-center">Action</th>
              </tr>
            </thead>

            <tbody id="expenseTableBody" class="border-top-0">
            </tbody>
          </table>
        </div>

      </div>
    </div>

    <!--Pagination-->
    <div class="card bg-light border-0 shadow-sm d-table mx-auto mb-2">
      <div class="card-body">
        <nav aria-label="Page navigation example">
          <ul id="paginationControl" class="pagination justify-content-center mb-0">
          </ul>
        </nav>
      </div>
    </div>

  </section>

  <!-- Bottom Nav -->
  <div class="container">
    <nav class="navbar bg-dark fixed-bottom p-0 shadow-lg">
      <ul class="nav w-100 nav-justified align-items-center">
        <li class="nav-item">
          <a href="index.html" class="nav-link text-light d-flex flex-column align-items-center py-2">
            <img src="components/images/home.png" alt="HOME" width="24" height="24">
            <span style="font-size: 10px;">HOME</span>
          </a>
        </li>
        <li class="nav-item position-relative">
          <a href="new.html" class="nav-link d-flex justify-content-center">
            <div
              class="bg-light rounded-circle shadow d-flex align-items-center justify-content-center position-absolute top-0 start-50 translate-middle"
              style="width: 56px; height: 56px;">
              <img src="components/images/plus-circle-fill.svg" alt="Add Expense" width="24" height="24">
            </div>
          </a>
        </li>
        <li class="nav-item">
          <a href="transaction.html" class="nav-link text-light d-flex flex-column align-items-center py-2">
            <img src="components/images/transaction.png" alt="TRANSACTIONS" width="24" height="24">
            <span style="font-size: 10px;">TRANSACTIONS</span>
          </a>
        </li>
      </ul>
    </nav>
  </div>

  <script src="components/js/chart.umd.js"></script>
  <script src="components/js/dayjs.min.js"></script>
  <script>dayjs().format()</script>
  <script src="components/js/main.js"></script>
  <script src="components/js/bootstrap.bundle.min.js"></script>
</body>

</html>
