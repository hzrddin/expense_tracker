<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta http-equiv="Content-Security-Policy"
    content="default-src * data: gap: https://ssl.gstatic.com; style-src * 'unsafe-inline'; script-src * 'unsafe-inline' 'unsafe-eval'">
  <title>Personal Tracker</title>
  <link rel="icon" href="components/images/logo-svg.svg">
  <link rel="stylesheet" href="components/css/bootstrap.min.css">
  <link rel="stylesheet" href="components/css/main.css">

</head>

<body>
  <!-- Top Nav -->
  <nav class="navbar navbar-dark bg-dark fixed-top" style="z-index: 1050;">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Personal Expense</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar"
        aria-controls="offcanvasDarkNavbar" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="offcanvas offcanvas-end text-bg-dark w-75" tabindex="-1" id="offcanvasDarkNavbar"
        aria-labelledby="offcanvasDarkNavbarLabel">

        <div class="offcanvas-header">
          <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">Menu</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
            aria-label="Close"></button>
        </div>

        <div class="offcanvas-body">
          <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="transaction.html">Transactions</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="new.html">New Expense</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="log.html">Activity Log</a>
            </li>
          </ul>
        </div>

      </div>
    </div>
  </nav>

  <!-- Form -->
  <section class="container">
    <div class="container d-flex justify-content-center align-items-center py-3"
      style="min-height: calc(100vh - 100px);">

      <div class="card bg-light border-0 shadow-sm rounded-4 w-100">
        <div class="card-body p-4 p-md-5">

          <div class="d-flex align-items-center pb-4 mb-4 border-bottom">
            <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
              style="width: 56px; height: 56px; background-color: #f5ebe3; color: #1f2937;">
              <img src="components/images/wallet2.svg" width="22" height="22" alt="TotalSpent">
            </div>
            <div class="ms-3">
              <h4 class="fw-bold mb-1 text-dark">Add Expense</h4>
              <div class="text-secondary small">Record your expense details</div>
            </div>
          </div>

          <form class="needs-validation" validate>
            <div class="row g-3 mb-3">
              <div class="col-12 col-md-5">
                <label for="expenseAmount" class="form-label small text-dark mb-1">Amount (RM)</label>
                <div class="input-group shadow-sm">
                  <span class="input-group-text icon-box text-dark border-end-0">RM</span>
                  <input type="number" class="form-control bg-input-beige border-start-0" id="expenseAmount"
                    placeholder="0.00" min="0" step="0.01" required>
                </div>
              </div>

              <div class="col-12 col-md-7">
                <label for="expenseDate" class="form-label small text-dark mb-1">Date</label>
                <div class="input-group shadow-sm">
                  <span class="input-group-text icon-box text-secondary border-end-0">
                    <img src="components/images/calendar3.svg" width="16" height="16" alt="Calendar">
                  </span>
                  <input type="date" class="form-control bg-input-beige border-start-0" id="expenseDate" required>
                  <button type="button" class="btn btn-light border">Today</button>
                </div>
              </div>
            </div>

            <div class="mb-3">
              <label for="expenseCategory" class="form-label small text-dark mb-1">Category</label>
              <div class="input-group shadow-sm">
                <span class="input-group-text icon-box text-secondary border-end-0">
                  <img src="components/images/grid.svg" width="16" height="16" alt="Category">
                </span>
                <select class="form-select bg-input-beige border-start-0" id="expenseCategory" required>
                  <option selected disabled value="">Choose Category</option>
                  <option value="Food">Food</option>
                  <option value="Transport">Transport</option>
                  <option value="Entertainment">Entertainment</option>
                  <option value="Education">Education</option>
                  <option value="Shopping">Shopping</option>
                  <option value="Health">Health</option>
                  <option value="Others">Others</option>
                </select>
              </div>
            </div>

            <div class="mb-4">
              <label for="expenseDescription" class="form-label small text-dark mb-1">Description</label>
              <div class="input-group shadow-sm">
                <span class="input-group-text icon-box icon-box-top text-secondary border-end-0">
                  <img src="components/images/file-earmark-text.svg" width="16" height="16" alt="Description">
                </span>
                <textarea class="form-control bg-input-beige border-start-0 resize-none" id="expenseDescription"
                  rows="3" placeholder="Expense Description"></textarea>
              </div>
            </div>

            <div class="d-flex justify-content-end gap-3 mt-4 pt-2">
              <button class="btn btn-danger d-flex align-items-center gap-2 px-4" type="reset">
                <img src="components/images/arrow-repeat.svg" width="16" height="16" alt="Reset">
                Reset
              </button>
              <button class="btn btn-success d-flex align-items-center gap-2 px-4" onclick="saveRecord()" type="submit">
                <img src="components/images/floppy.svg" width="16" height="16" alt="Save">
                Save Expense
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- Bottom Nav -->
  <nav class="navbar bg-dark fixed-bottom p-0 shadow-lg">
    <ul class="nav w-100 nav-justified align-items-center">

      <li class="nav-item">
        <a href="index.html" class="nav-link text-light d-flex flex-column align-items-center py-2">
          <img src="components/images/home.png" alt="HOME" width="24" height="24">
          <span style="font-size: 10px;">HOME</span>
        </a>
      </li>

      <li class="nav-item position-relative">
        <a href="new.html" class="nav-link d-flex justify-content-center">
          <div
            class="bg-light rounded-circle shadow d-flex align-items-center justify-content-center position-absolute top-0 start-50 translate-middle"
            style="width: 56px; height: 56px;">
            <img src="components/images/plus-circle-fill.svg" alt="New Expense" width="24" height="24">
          </div>
        </a>
      </li>

      <li class="nav-item">
        <a href="transaction.html" class="nav-link text-light d-flex flex-column align-items-center py-2">
          <img src="components/images/transaction.png" alt="TRANSACTIONS" width="24" height="24">
          <span style="font-size: 10px;">TRANSACTIONS</span>
        </a>
      </li>
    </ul>
  </nav>

  <script src="components/js/bootstrap.bundle.min.js"></script>
</body>

</html>
