<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta http-equiv="Content-Security-Policy"
    content="default-src * data: gap: https://ssl.gstatic.com; style-src * 'unsafe-inline'; script-src * 'unsafe-inline' 'unsafe-eval'">
  <script src="cordova.js"></script>
  <title>Personal Tracker</title>
  <link rel="stylesheet" href="components/css/bootstrap.min.css">

</head>

<body>
  <!-- Top Nav -->
  <nav class="navbar navbar-dark bg-dark fixed-top" style="z-index: 1050;">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Personal Expense</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar"
        aria-controls="offcanvasDarkNavbar" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="offcanvas offcanvas-end text-bg-dark w-75" tabindex="-1" id="offcanvasDarkNavbar"
        aria-labelledby="offcanvasDarkNavbarLabel">

        <div class="offcanvas-header">
          <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">Menu</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
            aria-label="Close"></button>
        </div>

        <div class="offcanvas-body">
          <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="transaction.html">Transactions</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="new.html">New Expense</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="log.html">Activity Log</a>
            </li>
          </ul>
        </div>

      </div>
    </div>
  </nav>

  <!-- Form -->
  <div class="container d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 112px);">
    <div>
      <h2>Add Expense</h2>
      <div class="card shadow-sm p-2">
        <form>
          <div class="row gx-2">
            <div class="col-4 mb-3">
              <label for="validationDefault01">Amount (RM)</label>
              <input type="number" class="form-control" id="validationDefault01" required>
            </div>
            <div class="col-8 mb-3">
              <label for="validationDefault02">Date</label>
              <div class="gap-2 input-group">
                <input type="date" class="form-control" id="validationDefault02" required>
                <button type="button" class="btn btn-light">Today</button>
              </div>
            </div>
          </div>
          <div class="col mb-3">
            <label for="validationDefault03" class="form-label">Category</label>
            <select class="form-select" id="validationDefault03" required>
              <option selected disabled value="">Choose Category</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Education">Education</option>
              <option value="Shopping">Shopping</option>
              <option value="Health">Health</option>
              <option value="Others">Others</option>
            </select>
          </div>
          <div class="col mb-3">
            <label for="validationDefault04">Description</label>
            <textarea style="resize: none;" type="text" class="form-control" id="validationDefault04" required></textarea>
          </div>
          <div class="text-center">
            <button class="btn btn-danger" type="reset">Reset</button>
            <button class="btn btn-success" type="submit">Save Expense</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="navbar bg-dark fixed-bottom p-0 shadow-lg">
    <ul class="nav w-100 nav-justified align-items-center">

      <li class="nav-item">
        <a href="index.html" class="nav-link text-light d-flex flex-column align-items-center py-2">
          <img src="components/images/home.png" alt="HOME" width="24" height="24">
          <span style="font-size: 10px;">HOME</span>
        </a>
      </li>

      <li class="nav-item position-relative">
        <a href="new.html" class="nav-link d-flex justify-content-center">
          <div
            class="bg-light rounded-circle shadow d-flex align-items-center justify-content-center position-absolute top-0 start-50 translate-middle"
            style="width: 56px; height: 56px;">
            <img src="components/images/plus-circle-fill.svg" alt="New Expense" width="24" height="24">
          </div>
        </a>
      </li>

      <li class="nav-item">
        <a href="transaction.html" class="nav-link text-light d-flex flex-column align-items-center py-2">
          <img src="components/images/transaction.png" alt="TRANSACTIONS" width="24" height="24">
          <span style="font-size: 10px;">TRANSACTIONS</span>
        </a>
      </li>
    </ul>
  </nav>

  <script src="components/js/bootstrap.bundle.min.js"></script>
</body>

</html>
