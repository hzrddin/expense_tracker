<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta http-equiv="Content-Security-Policy"
    content="default-src * data: gap: https://ssl.gstatic.com; style-src * 'unsafe-inline'; script-src * 'unsafe-inline' 'unsafe-eval'">
  <script src="cordova.js"></script>
  <title>Personal Tracker</title>
  <link rel="stylesheet" href="components/css/bootstrap.min.css">

</head>

<body>
  <!-- Top Nav -->
  <nav class="navbar navbar-dark bg-dark fixed-top" style="z-index: 1050;">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Personal Expense</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar"
        aria-controls="offcanvasDarkNavbar" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="offcanvas offcanvas-end text-bg-dark w-75" tabindex="-1" id="offcanvasDarkNavbar"
        aria-labelledby="offcanvasDarkNavbarLabel">

        <div class="offcanvas-header">
          <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">Menu</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
            aria-label="Close"></button>
        </div>

        <div class="offcanvas-body">
          <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
            <li class="nav-item">
              <a class="nav-link active" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="transaction.html">Transactions</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="new.html">New Expense</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="log.html">Activity Log</a>
            </li>
          </ul>
        </div>

      </div>
    </div>
  </nav>

  <section class="container" style="margin-top: 5rem; padding-bottom: 5rem;">

    <div class="card bg-light border-0 shadow-sm w-100 mb-3">
      <div class="card-body p-3 d-flex align-items-center">

        <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
          style="width: 50px; height: 50px; background-color: #f5ebe3; color: #8e735b;">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" class="bi bi-wallet2"
            viewBox="0 0 16 16">
            <path
              d="M12.136.326A1.5 1.5 0 0 1 14 1.78V3h.5A1.5 1.5 0 0 1 16 4.5v9a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 0 13.5v-9a1.5 1.5 0 0 1 1.432-1.499L12.136.326zM5.562 3H13V1.78a.5.5 0 0 0-.621-.484L5.562 3zM1.5 4a.5.5 0 0 0-.5.5v9a.5.5 0 0 0 .5.5h13a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5h-13z" />
          </svg>
        </div>

        <div class="flex-grow-1 ms-3">
          <div class="fw-medium mb-1" style="font-size: 0.8rem; color: #8e735b;">Total Spent</div>
          <h2 class="mb-0 fw-bold" id="totalSpent">Total Spent</h2>
          <div class="text-secondary mb-1" style="font-size: 0.8rem;">Spent this Month</div>
        </div>

      </div>
    </div>

    <div class="card mb-2 bg-light border-0 shadow-sm">
      <div class="card-body">
        <div>
          <img src="components/images/sample.jpg" class="img-fluid mx-auto" alt="Charts">
        </div>
      </div>
    </div>

    <!--Number Trans & Avg-->
    <div class="row g-2 mb-2">

      <!--Number Trans-->
      <div class="col-6">
        <div class="card bg-light h-100 border-0 shadow-sm">
          <div class="card-body p-2 d-flex align-items-center">
            <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
              style="width: 44px; height: 44px; background-color: #f5ebe3; color: #8e735b;">
              <img src="/www/components/images/receipt-cutoff.svg" alt="Total Transactions">
            </div>

            <div class="ms-2">
              <h5 class="mb-0 fw-bold" id="numTransactions">Total Trans</h5>
              <div class="text-secondary" style="font-size: 0.75rem; line-height: 1.2;">Transactions</div>
              <div class="text-black-50" style="font-size: 0.65rem;">This Month</div>
            </div>
          </div>
        </div>
      </div>

      <!--Avg-->
      <div class="col-6">
        <div class="card bg-light h-100 border-0 shadow-sm">
          <div class="card-body p-2 d-flex align-items-center">
            <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
              style="width: 44px; height: 44px; background-color: #f5ebe3; color: #8e735b;">
              <img src="/www/components/images/graph-up-arrow.svg" alt="Avg Spending">
            </div>

            <div class="ms-2">
              <h5 class="mb-0 fw-bold fs-6" id="avgSpend">RM Test</h5>
              <div class="text-secondary" style="font-size: 0.75rem; line-height: 1.2;">Average Spend</div>
              <div class="text-black-50" style="font-size: 0.65rem;">Per Transaction</div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!--Highest Trans-->
    <div class="card bg-light border-0 shadow-sm w-100">
      <div class="card-body p-3">

        <h6 class="fw-bold text-danger mb-3" style="font-size: 0.85rem;">Highest Expense</h6>

        <div class="row align-items-center g-0">

          <div class="col-7 pe-3 border-end">
            <div class="d-flex align-items-center">

              <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
                style="width: 50px; height: 50px; background-color: #fdeaea; color: #b91c1c;">
                <img src="/www/components/images/cart2.svg" width="22" height="22" fill="currentColor"
                  alt="Highest Expense">
              </div>

              <div class="ms-3">
                <h4 class="mb-0 fw-bold" style="color: #b91c1c;">RM 155.00</h4>
                <div class="text-dark fw-medium" style="font-size: 0.85rem; line-height: 1.2;">Food</div>

                <div class="text-secondary d-flex align-items-center mt-1" style="font-size: 0.75rem;">
                  <img src="/www/components/images/calendar3.svg" width="10" height="10" fill="currentColor"
                    alt="Calendar">
                  1 Jun 2026
                </div>

              </div>
            </div>
          </div>

          <div class="col-5 ps-3">
            <div class="d-flex flex-column justify-content-center h-100">
              <div class="d-flex align-items-center mb-1" style="font-size: 0.75rem; color: #8e735b;">
                <img src="/www/components/images/file-text.svg" alt="Description" width="12" height="12"
                  fill="currentColor">
                Description
              </div>

              <div class="text-dark fw-medium" style="font-size: 0.8rem; line-height: 1.2;">
                Grocery Shopping
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>

  </section>

  <!-- Bottom Nav -->
  <nav class="navbar bg-dark fixed-bottom p-0 shadow-lg">
    <ul class="nav w-100 nav-justified align-items-center">

      <li class="nav-item">
        <a href="index.html" class="nav-link text-light d-flex flex-column align-items-center py-2">
          <img src="components/images/home.png" alt="HOME" width="24" height="24">
          <span style="font-size: 10px;">HOME</span>
        </a>
      </li>

      <li class="nav-item position-relative">
        <a href="new.html" class="nav-link d-flex justify-content-center">
          <div
            class="bg-light rounded-circle shadow d-flex align-items-center justify-content-center position-absolute top-0 start-50 translate-middle"
            style="width: 56px; height: 56px;">
            <img src="components/images/plus-circle-fill.svg" alt="New Expense" width="24" height="24">
          </div>
        </a>
      </li>

      <li class="nav-item">
        <a href="transaction.html" class="nav-link text-light d-flex flex-column align-items-center py-2">
          <img src="components/images/transaction.png" alt="TRANSACTIONS" width="24" height="24">
          <span style="font-size: 10px;">TRANSACTIONS</span>
        </a>
      </li>
    </ul>
  </nav>

  <script src="components/js/bootstrap.bundle.min.js"></script>
</body>

</html>
